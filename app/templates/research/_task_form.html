{% set is_edit = task is not none %}
<form hx-post="{{ '/research/' ~ task.id if is_edit else '/research/' }}"
      hx-target="#task-board"
      hx-swap="innerHTML">
  <div class="row g-2">
    <div class="col-md-6">
      <label class="form-label small fw-semibold">Section</label>
      <select name="section" class="form-select form-select-sm" required>
        {% for num, name in section_names.items() %}
        <option value="{{ num }}" {% if is_edit and task.section == num %}selected{% endif %}>Section {{ num }} — {{ name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-3">
      <label class="form-label small fw-semibold">Priority</label>
      <select name="priority" class="form-select form-select-sm">
        <option value="high" {% if is_edit and task.priority == 'high' %}selected{% endif %}>High</option>
        <option value="medium" {% if not is_edit or task.priority == 'medium' %}selected{% endif %}>Medium</option>
        <option value="low" {% if is_edit and task.priority == 'low' %}selected{% endif %}>Low</option>
      </select>
    </div>
    <div class="col-md-3">
      <label class="form-label small fw-semibold">Status</label>
      <select name="status" class="form-select form-select-sm">
        {% for s in ['not_started', 'in_progress', 'blocked', 'done'] %}
        <option value="{{ s }}" {% if is_edit and task.status == s %}selected{% endif %}>
          {{ s | replace("_", " ") | title }}
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-9">
      <label class="form-label small fw-semibold">What <span class="text-danger">*</span></label>
      <input type="text" name="what" class="form-control form-control-sm" required
             value="{{ task.what if is_edit else '' }}"
             placeholder="Task description">
    </div>
    <div class="col-md-3">
      <label class="form-label small fw-semibold">Due</label>
      <input type="text" name="due_date_raw" class="form-control form-control-sm"
             value="{{ task.due_date_raw if is_edit else '' }}"
             placeholder="e.g. Week 2">
    </div>
    <div class="col-md-6">
      <label class="form-label small fw-semibold">Why</label>
      <textarea name="why" class="form-control form-control-sm" rows="2"
                placeholder="Why this matters">{{ task.why if is_edit else '' }}</textarea>
    </div>
    <div class="col-md-6">
      <label class="form-label small fw-semibold">How / Source</label>
      <textarea name="how_source" class="form-control form-control-sm" rows="2"
                placeholder="Where to find info, who to call">{{ task.how_source if is_edit else '' }}</textarea>
    </div>
    <div class="col-md-6">
      <label class="form-label small fw-semibold">Owner</label>
      <input type="text" name="owner" class="form-control form-control-sm"
             value="{{ task.owner if is_edit else '' }}"
             placeholder="Who's responsible">
    </div>
    <div class="col-12">
      <label class="form-label small fw-semibold">Notes</label>
      <textarea name="notes" class="form-control form-control-sm" rows="2">{{ task.notes if is_edit else '' }}</textarea>
    </div>
    <div class="col-12">
      <label class="form-label small fw-semibold">Prerequisites <span class="text-muted fw-normal">(what needs to be done before starting this)</span></label>
      <select id="dep-select" name="depends_on" multiple class="form-select form-select-sm">
        {% for t in all_tasks %}
        {% if not is_edit or t.id != task.id %}
        <option value="{{ t.id }}" {% if t.id in current_dep_ids %}selected{% endif %}>[{{ t.section_name }}] {{ t.what }}</option>
        {% endif %}
        {% endfor %}
      </select>
    </div>
  </div>
  <div class="d-flex justify-content-end gap-2 mt-3">
    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
    <button type="submit" class="btn btn-primary btn-sm">
      {{ "Save Changes" if is_edit else "Add Task" }}
    </button>
  </div>
</form>
