{# Single chat message bubble.
   Context: msg (ChatMessage), msg.role is "user" or "assistant"
#}
<div class="chat-msg chat-msg--{{ msg.role }}">
  <div class="chat-label chat-label--{{ msg.role }}">{{ "You" if msg.role == "user" else "Prime Micro Markets" }}</div>
  <div class="chat-bubble chat-bubble--{{ msg.role }}">{{ msg.content | chat_format if msg.role == "assistant" else msg.content }}</div>
  <div class="chat-ts">{{ msg.created_at.strftime('%H:%M') if msg.created_at else '' }}</div>
</div>
