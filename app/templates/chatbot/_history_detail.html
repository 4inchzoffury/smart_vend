{# Full conversation for employee Chat History view — Bootstrap-only styling #}
<div class="p-2">
  {% for msg in msgs %}
  <div class="mb-2 {% if msg.role == 'user' %}text-end{% endif %}">
    <div class="d-inline-block px-3 py-2 rounded-3 small"
         style="max-width:85%;white-space:pre-wrap;word-break:break-word;
                {% if msg.role == 'user' %}
                  background:#e8f0fe;color:#1a1a2e;
                {% else %}
                  background:#f8f9fa;border:1px solid #dee2e6;
                {% endif %}">
      {{ msg.content }}
    </div>
    <div class="text-muted mt-1" style="font-size:.65rem">
      {{ msg.created_at.strftime('%b %d, %H:%M') if msg.created_at else '' }}
    </div>
  </div>
  {% else %}
  <p class="text-muted small text-center py-3 mb-0">No messages in this session.</p>
  {% endfor %}
</div>
