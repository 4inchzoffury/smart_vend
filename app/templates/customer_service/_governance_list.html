{# Governance rules table rows — HTMX-swappable #}

{% if rules %}
<div class="table-responsive">
  <table class="table table-sm align-middle mb-0">
    <thead class="table-light">
      <tr>
        <th style="width:110px">Category</th>
        <th>Title</th>
        <th>Rule</th>
        <th style="width:90px" class="text-center">Active</th>
        <th style="width:80px"></th>
      </tr>
    </thead>
    <tbody>
      {% for rule in rules %}
      {% include "customer_service/_governance_row.html" %}
      {% endfor %}
    </tbody>
  </table>
</div>
{% else %}
<div class="text-center text-muted py-4">
  <i class="bi bi-shield-x fs-2 d-block mb-2 opacity-40"></i>
  No governance rules yet. Add one to start governing the chatbot.
</div>
{% endif %}
