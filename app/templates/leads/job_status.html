{% extends "base.html" %}
{% block title %}Job #{{ job.id }} – Prime Vending{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1 class="h4 mb-0">
    <i class="bi bi-gear me-2"></i>Agent Job #{{ job.id }}
    <span class="badge bg-secondary ms-2">{{ job.job_type }}</span>
  </h1>
  <a href="/leads/" class="btn btn-sm btn-outline-secondary">
    <i class="bi bi-arrow-left me-1"></i>Back to Lead Gen
  </a>
</div>

<div id="job-status-card"
     hx-get="/leads/jobs/{{ job.id }}/poll"
     hx-trigger="{{ 'every 2s' if job.status in ('pending', 'running') else 'none' }}"
     hx-swap="outerHTML">
  {% include "leads/_job_status_card.html" %}
</div>
{% endblock %}
