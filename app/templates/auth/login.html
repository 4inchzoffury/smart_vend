<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In – Prime Micro Markets</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 60%, #0d4f6b 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 1rem;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
    }
    .brand-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #0ea5e9, #0d9488);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      color: #fff;
      margin: 0 auto 1.25rem;
    }
    .btn-google {
      background: #fff;
      border: 1.5px solid #dadce0;
      color: #3c4043;
      font-weight: 500;
      padding: .65rem 1rem;
      border-radius: .5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .65rem;
      transition: background .15s, box-shadow .15s;
      text-decoration: none;
      font-size: .95rem;
    }
    .btn-google:hover {
      background: #f8f9fa;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
      color: #3c4043;
    }
    .btn-google svg { flex-shrink: 0; }
    .divider { color: #9ca3af; font-size: .8rem; }
    .back-link { color: #6b7280; font-size: .82rem; }
    .back-link:hover { color: #374151; }
  </style>
</head>
<body>
  <div class="login-card text-center">
    <div class="brand-icon">
      <i class="bi bi-box-seam-fill"></i>
    </div>
    <h1 class="h5 fw-bold mb-1">Prime Micro Markets</h1>
    <p class="text-muted mb-4" style="font-size:.875rem;">Staff Portal — sign in with your company Google account</p>

    {% if error %}
    <div class="alert alert-warning d-flex align-items-center gap-2 text-start mb-3" style="font-size:.875rem;">
      <i class="bi bi-exclamation-triangle-fill flex-shrink-0"></i>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    <a href="/auth/google" class="btn-google w-100 mb-3">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Continue with Google
    </a>

    <p class="divider my-2">— internal use only —</p>

    <a href="/" class="btn btn-outline-secondary btn-sm w-100 mt-1">
      <i class="bi bi-globe me-1"></i>Go to Customer Portal
    </a>
  </div>
</body>
</html>
