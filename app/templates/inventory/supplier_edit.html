{% extends "base.html" %}
{% block title %}Edit Supplier – Prime Vending{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1 class="h3 mb-0">Edit Supplier</h1>
  <a href="/inventory/suppliers" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left me-1"></i>Back to Suppliers
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-lg-6 col-md-8">
    <div class="card">
      <div class="card-header py-2 fw-semibold small">{{ supplier.name }}</div>
      <div class="card-body">
        <form method="post" action="/inventory/suppliers/{{ supplier.id }}">
          {% include "inventory/_supplier_form_fields.html" %}
          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-primary btn-sm">Save Changes</button>
            <a href="/inventory/suppliers" class="btn btn-outline-secondary btn-sm">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
