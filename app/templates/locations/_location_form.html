{% set is_edit = location is not none %}
<form method="post" action="{{ '/locations/' ~ location.id if is_edit else '/locations/' }}">
  <div class="row g-2">
    <div class="col-12">
      <label class="form-label small fw-semibold">Name <span class="text-danger">*</span></label>
      <input type="text" name="name" class="form-control form-control-sm" required
             value="{{ location.name if is_edit else '' }}"
             placeholder="e.g. HCA Gulf Coast Hospital — Main Lobby">
    </div>
    <div class="col-md-8">
      <label class="form-label small fw-semibold">Address</label>
      <input type="text" name="address" class="form-control form-control-sm"
             value="{{ location.address or '' if is_edit else '' }}">
    </div>
    <div class="col-md-4">
      <label class="form-label small fw-semibold">Venue Type</label>
      <select name="venue_type" class="form-select form-select-sm">
        <option value="">— Select —</option>
        {% for t in ['hospital', 'hotel', 'gym', 'office', 'military', 'retail', 'other'] %}
        <option value="{{ t }}" {% if is_edit and location.venue_type == t %}selected{% endif %}>
          {{ t | title }}
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-5">
      <label class="form-label small fw-semibold">City</label>
      <input type="text" name="city" class="form-control form-control-sm"
             value="{{ location.city if is_edit else 'Panama City' }}">
    </div>
    <div class="col-md-2">
      <label class="form-label small fw-semibold">State</label>
      <input type="text" name="state" class="form-control form-control-sm" maxlength="2"
             value="{{ location.state if is_edit else 'FL' }}">
    </div>
    <div class="col-md-5">
      <label class="form-label small fw-semibold">Foot Traffic</label>
      <select name="foot_traffic_estimate" class="form-select form-select-sm">
        <option value="">— Select —</option>
        {% for t in ['low', 'medium', 'high', 'very_high'] %}
        <option value="{{ t }}" {% if is_edit and location.foot_traffic_estimate == t %}selected{% endif %}>
          {{ t | replace("_", " ") | title }}
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-6">
      <label class="form-label small fw-semibold">Contact Name</label>
      <input type="text" name="contact_name" class="form-control form-control-sm"
             value="{{ location.contact_name or '' if is_edit else '' }}">
    </div>
    <div class="col-md-6">
      <label class="form-label small fw-semibold">Contact Email</label>
      <input type="email" name="contact_email" class="form-control form-control-sm"
             value="{{ location.contact_email or '' if is_edit else '' }}">
    </div>
    <div class="col-md-6">
      <label class="form-label small fw-semibold">Contact Phone</label>
      <input type="tel" name="contact_phone" class="form-control form-control-sm"
             value="{{ location.contact_phone or '' if is_edit else '' }}">
    </div>
    <div class="col-md-3">
      <label class="form-label small fw-semibold">Status</label>
      <select name="status" class="form-select form-select-sm">
        {% for s in ['prospect', 'pending', 'active', 'maintenance', 'inactive'] %}
        <option value="{{ s }}" {% if is_edit and location.status == s %}selected{% elif not is_edit and s == 'prospect' %}selected{% endif %}>
          {{ s | title }}
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-3">
      <label class="form-label small fw-semibold">Contract Status</label>
      <select name="contract_status" class="form-select form-select-sm">
        {% for s in ['none', 'in_negotiation', 'signed', 'expired'] %}
        <option value="{{ s }}" {% if is_edit and location.contract_status == s %}selected{% endif %}>
          {{ s | replace("_", " ") | title }}
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="col-12">
      <label class="form-label small fw-semibold">Notes</label>
      <textarea name="notes" class="form-control form-control-sm" rows="2">{{ location.notes or '' if is_edit else '' }}</textarea>
    </div>
  </div>
  <div class="d-flex justify-content-end gap-2 mt-3">
    {% if is_edit %}
    <a href="/locations/{{ location.id }}" class="btn btn-secondary btn-sm">Cancel</a>
    {% else %}
    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
    {% endif %}
    <button type="submit" class="btn btn-primary btn-sm">
      {{ "Save Changes" if is_edit else "Add Location" }}
    </button>
  </div>
</form>
