<form method="post" action="/crm/{{ client.id }}/sites/{{ site.id }}/equipment">
  <p class="small text-muted mb-3">
    <i class="bi bi-building me-1"></i>Adding to: <strong>{{ site.site_name }}</strong>
    {% if site.address %} · {{ site.address }}, {{ site.city }}{% endif %}
  </p>
  <div class="row g-2">
    <div class="col-md-6">
      <label class="form-label small fw-semibold">Equipment Type</label>
      <select name="equipment_type" class="form-select form-select-sm">
        <option value="">— Select Type —</option>
        {% for t in equipment_types %}
        <option value="{{ t }}" {% if eq and eq.equipment_type == t %}selected{% endif %}>
          {{ t | replace("_", " ") | title }}
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-6">
      <label class="form-label small fw-semibold">Status</label>
      <select name="status" class="form-select form-select-sm">
        {% for s in equipment_statuses %}
        <option value="{{ s }}" {% if eq and eq.status == s %}selected{% elif not eq and s == 'active' %}selected{% endif %}>
          {{ s | replace("_", " ") | title }}
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-6">
      <label class="form-label small fw-semibold">Manufacturer</label>
      <input type="text" name="manufacturer" class="form-control form-control-sm"
             value="{{ eq.manufacturer or '' if eq else '' }}"
             placeholder="e.g. Cooler Depot, 365 Retail">
    </div>
    <div class="col-md-6">
      <label class="form-label small fw-semibold">Model Name</label>
      <input type="text" name="model_name" class="form-control form-control-sm"
             value="{{ eq.model_name or '' if eq else '' }}">
    </div>
    <div class="col-md-6">
      <label class="form-label small fw-semibold">Serial Number</label>
      <input type="text" name="serial_number" class="form-control form-control-sm font-monospace"
             value="{{ eq.serial_number or '' if eq else '' }}">
    </div>
    <div class="col-md-6">
      <label class="form-label small fw-semibold">Install Date</label>
      <input type="date" name="install_date" class="form-control form-control-sm"
             value="{{ eq.install_date.isoformat() if eq and eq.install_date else '' }}">
    </div>
    <div class="col-12">
      <label class="form-label small fw-semibold">
        Placement / Location within Site
        <span class="text-muted fw-normal">(describe exactly where this unit is located)</span>
      </label>
      <input type="text" name="placement_description" class="form-control form-control-sm"
             value="{{ eq.placement_description or '' if eq else '' }}"
             placeholder="e.g. Break room B, near east wall · Main lobby beside elevators">
    </div>
    <div class="col-md-4">
      <label class="form-label small fw-semibold">Monthly Fee ($)</label>
      <input type="number" name="monthly_fee" step="0.01" min="0" class="form-control form-control-sm"
             value="{{ eq.monthly_fee if eq and eq.monthly_fee else '' }}">
    </div>
    <div class="col-md-4">
      <label class="form-label small fw-semibold">Commission %</label>
      <input type="number" name="commission_pct" step="0.01" min="0" max="100" class="form-control form-control-sm"
             value="{{ eq.commission_pct if eq and eq.commission_pct else '' }}">
    </div>
    <div class="col-md-4">
      <label class="form-label small fw-semibold">Next Service Date</label>
      <input type="date" name="next_service_date" class="form-control form-control-sm"
             value="{{ eq.next_service_date.isoformat() if eq and eq.next_service_date else '' }}">
    </div>
    <div class="col-md-6">
      <label class="form-label small fw-semibold">Last Service Date</label>
      <input type="date" name="last_service_date" class="form-control form-control-sm"
             value="{{ eq.last_service_date.isoformat() if eq and eq.last_service_date else '' }}">
    </div>
    <div class="col-12">
      <label class="form-label small fw-semibold">Notes</label>
      <textarea name="notes" class="form-control form-control-sm" rows="2">{{ eq.notes or '' if eq else '' }}</textarea>
    </div>
  </div>
  <div class="d-flex justify-content-end gap-2 mt-3">
    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
    <button type="submit" class="btn btn-primary btn-sm">
      <i class="bi bi-plus-lg me-1"></i>Add Equipment
    </button>
  </div>
</form>
