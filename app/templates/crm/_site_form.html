{% set is_edit = site is not none %}
<form method="post" action="{{ '/crm/' ~ client.id ~ '/sites/' ~ site.id if is_edit else '/crm/' ~ client.id ~ '/sites' }}">
  <div class="row g-2">
    <div class="col-12">
      <label class="form-label small fw-semibold">Site Name <span class="text-danger">*</span></label>
      <input type="text" name="site_name" class="form-control form-control-sm" required
             value="{{ site.site_name if is_edit else '' }}"
             placeholder="e.g. Main Office, Warehouse B">
    </div>
    <div class="col-12">
      <label class="form-label small fw-semibold">Street Address</label>
      <input type="text" name="address" class="form-control form-control-sm"
             value="{{ site.address or '' if is_edit else '' }}">
    </div>
    <div class="col-md-5">
      <label class="form-label small fw-semibold">City</label>
      <input type="text" name="city" class="form-control form-control-sm"
             value="{{ site.city if is_edit else 'Panama City' }}">
    </div>
    <div class="col-md-3">
      <label class="form-label small fw-semibold">State</label>
      <input type="text" name="state" class="form-control form-control-sm" maxlength="2"
             value="{{ site.state if is_edit else 'FL' }}">
    </div>
    <div class="col-md-4">
      <label class="form-label small fw-semibold">ZIP</label>
      <input type="text" name="zip_code" class="form-control form-control-sm"
             value="{{ site.zip_code or '' if is_edit else '' }}">
    </div>
    <div class="col-md-6">
      <label class="form-label small fw-semibold">Site Contact Name</label>
      <input type="text" name="contact_name" class="form-control form-control-sm"
             value="{{ site.contact_name or '' if is_edit else '' }}">
    </div>
    <div class="col-md-6">
      <label class="form-label small fw-semibold">Site Contact Phone</label>
      <input type="tel" name="contact_phone" class="form-control form-control-sm"
             value="{{ site.contact_phone or '' if is_edit else '' }}">
    </div>
    <div class="col-md-6">
      <label class="form-label small fw-semibold">Site Contact Email</label>
      <input type="email" name="contact_email" class="form-control form-control-sm"
             value="{{ site.contact_email or '' if is_edit else '' }}">
    </div>
    <div class="col-md-3">
      <label class="form-label small fw-semibold">Commission %</label>
      <input type="number" name="commission_pct" step="0.01" min="0" max="100"
             class="form-control form-control-sm"
             value="{{ site.commission_pct if is_edit and site.commission_pct else '' }}">
    </div>
    <div class="col-md-3">
      <label class="form-label small fw-semibold">Status</label>
      <select name="status" class="form-select form-select-sm">
        {% for s in ['active', 'inactive'] %}
        <option value="{{ s }}" {% if is_edit and site.status == s %}selected{% elif not is_edit and s == 'active' %}selected{% endif %}>
          {{ s | title }}
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-6">
      <label class="form-label small fw-semibold">Contract Start</label>
      <input type="date" name="contract_start" class="form-control form-control-sm"
             value="{{ site.contract_start.isoformat() if is_edit and site.contract_start else '' }}">
    </div>
    <div class="col-md-6">
      <label class="form-label small fw-semibold">Contract End</label>
      <input type="date" name="contract_end" class="form-control form-control-sm"
             value="{{ site.contract_end.isoformat() if is_edit and site.contract_end else '' }}">
    </div>
    <div class="col-12">
      <label class="form-label small fw-semibold">Notes</label>
      <textarea name="notes" class="form-control form-control-sm" rows="2">{{ site.notes or '' if is_edit else '' }}</textarea>
    </div>
  </div>
  <div class="d-flex justify-content-end gap-2 mt-3">
    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
    <button type="submit" class="btn btn-primary btn-sm">
      {{ "Save Changes" if is_edit else "Add Site" }}
    </button>
  </div>
</form>
