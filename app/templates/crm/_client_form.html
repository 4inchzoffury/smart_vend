{% set is_edit = client is not none %}
<form method="post" action="{{ '/crm/' ~ client.id if is_edit else '/crm/' }}">
  <div class="row g-2">
    <div class="col-12">
      <label class="form-label small fw-semibold">Company Name <span class="text-danger">*</span></label>
      <input type="text" name="company_name" class="form-control form-control-sm" required
             value="{{ client.company_name if is_edit else '' }}">
    </div>
    <div class="col-md-6">
      <label class="form-label small fw-semibold">Primary Contact Name</label>
      <input type="text" name="contact_name" class="form-control form-control-sm"
             value="{{ client.contact_name or '' if is_edit else '' }}">
    </div>
    <div class="col-md-6">
      <label class="form-label small fw-semibold">Title</label>
      <input type="text" name="contact_title" class="form-control form-control-sm"
             value="{{ client.contact_title or '' if is_edit else '' }}">
    </div>
    <div class="col-md-6">
      <label class="form-label small fw-semibold">Contact Email</label>
      <input type="email" name="contact_email" class="form-control form-control-sm"
             value="{{ client.contact_email or '' if is_edit else '' }}">
    </div>
    <div class="col-md-6">
      <label class="form-label small fw-semibold">Contact Phone</label>
      <input type="tel" name="contact_phone" class="form-control form-control-sm"
             value="{{ client.contact_phone or '' if is_edit else '' }}">
    </div>
    <div class="col-md-4">
      <label class="form-label small fw-semibold">Account Status</label>
      <select name="account_status" class="form-select form-select-sm">
        {% for s in (account_statuses or ['active', 'inactive', 'on_hold']) %}
        <option value="{{ s }}" {% if is_edit and client.account_status == s %}selected{% elif not is_edit and s == 'active' %}selected{% endif %}>
          {{ s | replace("_", " ") | title }}
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="col-12">
      <label class="form-label small fw-semibold">Notes</label>
      <textarea name="notes" class="form-control form-control-sm" rows="2">{{ client.notes or '' if is_edit else '' }}</textarea>
    </div>
  </div>
  <div class="d-flex justify-content-end gap-2 mt-3">
    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
    <button type="submit" class="btn btn-primary btn-sm">
      {{ "Save Changes" if is_edit else "Create Client" }}
    </button>
  </div>
</form>
