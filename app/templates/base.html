<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Prime Vending{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">
      <i class="bi bi-box-seam-fill me-1"></i>Prime Vending
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link {% if active_nav == 'research' %}active{% endif %}" href="/research/">
            <i class="bi bi-clipboard-check me-1"></i>Research Tasks
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active_nav == 'financial' %}active{% endif %}" href="/financial/">
            <i class="bi bi-calculator me-1"></i>Financial Models
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active_nav == 'locations' %}active{% endif %}" href="/locations/">
            <i class="bi bi-geo-alt me-1"></i>Locations
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active_nav == 'sales' %}active{% endif %}" href="/sales/">
            <i class="bi bi-funnel me-1"></i>Sales Pipeline
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active_nav == 'inventory' %}active{% endif %}" href="/inventory/">
            <i class="bi bi-box me-1"></i>Inventory
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active_nav == 'sync' %}active{% endif %}" href="/sync/">
            <i class="bi bi-arrow-repeat me-1"></i>Sync
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active_nav == 'leads' %}active{% endif %}" href="/leads/">
            <i class="bi bi-robot me-1"></i>Lead Gen
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="container-fluid py-3 px-4">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
