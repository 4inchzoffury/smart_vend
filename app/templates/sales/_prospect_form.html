{% set is_edit = prospect is not none %}
<form method="post" action="{{ '/sales/' ~ prospect.id if is_edit else '/sales/' }}">
  <div class="row g-2">
    <div class="col-md-8">
      <label class="form-label small fw-semibold">Company Name <span class="text-danger">*</span></label>
      <input type="text" name="company_name" class="form-control form-control-sm" required
             value="{{ prospect.company_name if is_edit else '' }}">
    </div>
    <div class="col-md-4">
      <label class="form-label small fw-semibold">Tier</label>
      <select name="tier" class="form-select form-select-sm">
        <option value="">—</option>
        {% for t in ['A', 'B', 'C'] %}
        <option value="{{ t }}" {% if is_edit and prospect.tier == t %}selected{% endif %}>{{ t }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-6">
      <label class="form-label small fw-semibold">Contact Name</label>
      <input type="text" name="contact_name" class="form-control form-control-sm"
             value="{{ prospect.contact_name or '' if is_edit else '' }}">
    </div>
    <div class="col-md-6">
      <label class="form-label small fw-semibold">Title</label>
      <input type="text" name="contact_title" class="form-control form-control-sm"
             value="{{ prospect.contact_title or '' if is_edit else '' }}">
    </div>
    <div class="col-md-6">
      <label class="form-label small fw-semibold">Email</label>
      <input type="email" name="contact_email" class="form-control form-control-sm"
             value="{{ prospect.contact_email or '' if is_edit else '' }}">
    </div>
    <div class="col-md-6">
      <label class="form-label small fw-semibold">Phone</label>
      <input type="tel" name="contact_phone" class="form-control form-control-sm"
             value="{{ prospect.contact_phone or '' if is_edit else '' }}">
    </div>
    <div class="col-md-6">
      <label class="form-label small fw-semibold">Venue Type</label>
      <select name="venue_type" class="form-select form-select-sm">
        <option value="">— Select —</option>
        {% for t in ['hospital', 'hotel', 'gym', 'office', 'military', 'retail', 'other'] %}
        <option value="{{ t }}" {% if is_edit and prospect.venue_type == t %}selected{% endif %}>{{ t | title }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-6">
      <label class="form-label small fw-semibold">City</label>
      <input type="text" name="city" class="form-control form-control-sm"
             value="{{ prospect.city if is_edit else 'Panama City' }}">
    </div>
    <div class="col-md-6">
      <label class="form-label small fw-semibold">Source</label>
      <select name="source" class="form-select form-select-sm">
        <option value="">— Select —</option>
        {% for s in ['linkedin', 'drive_by', 'referral', 'network_event', 'cold_email'] %}
        <option value="{{ s }}" {% if is_edit and prospect.source == s %}selected{% endif %}>
          {{ s | replace("_", " ") | title }}
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="col-12">
      <label class="form-label small fw-semibold">Next Action</label>
      <input type="text" name="next_action" class="form-control form-control-sm"
             value="{{ prospect.next_action or '' if is_edit else '' }}"
             placeholder="e.g. Send intro email, Schedule site visit">
    </div>
    <div class="col-12">
      <label class="form-label small fw-semibold">Notes</label>
      <textarea name="notes" class="form-control form-control-sm" rows="2">{{ prospect.notes or '' if is_edit else '' }}</textarea>
    </div>
  </div>
  <div class="d-flex justify-content-end gap-2 mt-3">
    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
    <button type="submit" class="btn btn-primary btn-sm">
      {{ "Save Changes" if is_edit else "Add Prospect" }}
    </button>
  </div>
</form>
